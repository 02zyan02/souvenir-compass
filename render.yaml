services:
  - type: web
    name: souvenir-compass-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
